<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <!--
    Grain YEMA · asset partagé, appliqué en overlay opacity 0.06 sur
    les portraits. feTurbulence fractalNoise génère un bruit organique
    façon film. Un seul fichier servi, cacheable, applied via CSS
    background-image sur tous les Portraits.
  -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="7" stitchTiles="stitch" />
    <feColorMatrix type="matrix" values="0 0 0 0 0.96
                                         0 0 0 0 0.92
                                         0 0 0 0 0.86
                                         0 0 0 1 0" />
  </filter>
  <rect width="100%" height="100%" filter="url(#grain)" />
</svg>
